name: Deploy to Cloudflare Pages

# QA is run locally before pushing (npm run qa) — kept out of CI to stay fast,
# matching the aegis workflow. This job only ships the site.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name mala --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d1ecd7ea82a6e81ddd3c7a583e4c1b89
